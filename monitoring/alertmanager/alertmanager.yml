global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  receiver: default-webhook

receivers:
  - name: default-webhook
    webhook_configs:
      - url: "http://feishu-bridge:5001/alertmanager/webhook"
        send_resolved: true

inhibit_rules:
  - source_matchers: ["severity=\"critical\""]
    target_matchers: ["severity=\"warning\""]
    equal: ["alertname", "instance"]
